<h2 mat-dialog-title>Delete user</h2>

<mat-dialog-content>
  <div class="d-flex align-items-start gap-3">
    <span class="dialog-icon dialog-icon--warn" aria-hidden="true">
      <mat-icon>warning_amber</mat-icon>
    </span>
    <p class="text-muted mb-0 mt-1 lh-base">
      Are you sure you want to delete <strong class="text-body">{{ data.email }}</strong>? This action cannot be
      undone.
    </p>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="onCancel()">Cancel</button>
  <button mat-flat-button color="warn" type="button" class="app-btn" (click)="onConfirm()">
    <mat-icon aria-hidden="true">delete</mat-icon>
    Delete user
  </button>
</mat-dialog-actions>
