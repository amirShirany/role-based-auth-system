<h2 mat-dialog-title>Delete user</h2>

<mat-dialog-content>
  <div class="delete-user-dialog">
    <span class="delete-user-dialog__icon" aria-hidden="true">
      <mat-icon>warning_amber</mat-icon>
    </span>
    <p class="delete-user-dialog__text">
      Are you sure you want to delete <strong>{{ data.email }}</strong>? This action cannot be
      undone.
    </p>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="onCancel()">Cancel</button>
  <button mat-flat-button color="warn" type="button" class="app-btn" (click)="onConfirm()">
    <mat-icon aria-hidden="true">delete</mat-icon>
    Delete user
  </button>
</mat-dialog-actions>
