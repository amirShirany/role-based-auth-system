<div class="auth-layout row g-0 min-vh-100">
  <div class="auth-layout__aside col-lg-6 d-none d-lg-flex align-items-center">
    <div class="px-4 px-xl-5 w-100">
      <span class="eyebrow-badge eyebrow-badge--surface mb-4">
        <mat-icon aria-hidden="true">verified_user</mat-icon>
        Secure access
      </span>
      <h1 class="display-5 fw-semibold mb-3">{{ appName }}</h1>
      <p class="text-muted fs-6 lh-lg mb-4">
        A modern workspace for account management, secure authentication, and user administration.
      </p>
      <ul class="list-unstyled d-grid gap-3 mb-0">
        <li class="d-flex align-items-center gap-2">
          <mat-icon class="text-success app-icon-md" aria-hidden="true">check_circle</mat-icon>
          Role-based access
        </li>
        <li class="d-flex align-items-center gap-2">
          <mat-icon class="text-success app-icon-md" aria-hidden="true">check_circle</mat-icon>
          Account activation flow
        </li>
        <li class="d-flex align-items-center gap-2">
          <mat-icon class="text-success app-icon-md" aria-hidden="true">check_circle</mat-icon>
          Enterprise-ready design
        </li>
      </ul>
    </div>
  </div>

  <div class="col-lg-6 d-flex align-items-center justify-content-center p-3 p-md-4">
    <mat-card appearance="outlined" class="auth-layout__card app-card w-100">
      <mat-card-content class="p-3 p-md-4">
        <router-outlet />
      </mat-card-content>
    </mat-card>
  </div>
</div>
